<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Undangan Pernikahan</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    text-align: center;
    background: #fff0f5;
}

/* Halaman pembuka */
#cover {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    background: linear-gradient(#ff9a9e, #fad0c4);
    color: white;
}

button {
    padding: 10px 20px;
    border: none;
    background: white;
    color: #e91e63;
    border-radius: 20px;
    cursor: pointer;
}

/* isi */
#isi {
    display: none;
    padding: 20px;
}

.card {
    background: white;
    padding: 20px;
    margin: 20px auto;
    border-radius: 15px;
    max-width: 400px;
    box-shadow: 0 0 10px rgba(0,0,0,0.2);
}

h1 { color: #e91e63; }
</style>
</head>

<body>

<!-- COVER -->
<div id="cover">
    <h2>Kepada Yth:</h2>
    <h3 id="namaTamu">Tamu Undangan</h3>
    <button onclick="bukaUndangan()">Buka Undangan</button>
</div>

<!-- ISI -->
<div id="isi">
    <div class="card">
        <h1>Undangan Pernikahan</h1>
        <p>Kami mengundang Anda</p>

        <h2>Jafar & HEMMM</h2>

        <p>Minggu, 10 Mei 2026</p>
        <p>Sragen</p>

        <br>

        <a href="https://maps.google.com" target="https://maps.app.goo.gl/1Z86hHyfraYWboTR9?g_st=aw">📍 Lihat Lokasi</a>
        <br><br>
        <a href="https://wa.me/628xxxxxxxxxx" target="0838-4797-2145">📲 Konfirmasi WA</a>
    </div>
</div>

<!-- MUSIK -->
<audio id="musik" loop>
  <source src="musik.mp3" type="audio/mpeg">
</audio>

<script>
// ambil nama dari link
const params = new URLSearchParams(window.location.search);
const nama = params.get("to");

if(nama){
    document.getElementById("namaTamu").innerText = nama;
}

// buka undangan
function bukaUndangan(){
    document.getElementById("cover").style.display = "none";
    document.getElementById("isi").style.display = "block";
    document.getElementById("musik").play();
}
</script>

</body>
</html>
